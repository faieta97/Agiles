name: Pipeline de Integración Continua (CI)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    name: 🐍 Ejecutar Pruebas y Cobertura
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Descargar código del repositorio
      uses: actions/checkout@v4

    - name: ⚙️ Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Instalar dependencias del sistema
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html pytest-cov

    - name: 🚀 Ejecutar pruebas y generar reportes HTML interactivos
      run: |
        # 1. Creamos dinámicamente un archivo CSS con diseño moderno, limpio y minimalista
        cat << 'EOF' > estilo_minimalista.css
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
          color: #334155 !important;
          background-color: #f8fafc !important;
          padding: 40px !important;
          max-width: 1000px !important;
          margin: 0 auto !important;
        }
        h1 {
          font-size: 22px !important;
          font-weight: 700 !important;
          color: #0f172a !important;
          letter-spacing: -0.025em !important;
          margin-bottom: 28px !important;
          border-bottom: none !important;
        }
        h2 {
          font-size: 16px !important;
          font-weight: 600 !important;
          color: #0f172a !important;
          margin-top: 32px !important;
          margin-bottom: 12px !important;
        }
        table {
          width: 100% !important;
          border-collapse: separate !important;
          border-spacing: 0 !important;
          border: 1px solid #e2e8f0 !important;
          border-radius: 10px !important;
          overflow: hidden !important;
          background-color: #ffffff !important;
          box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05) !important;
          margin-bottom: 24px !important;
        }
        th {
          background-color: #f1f5f9 !important;
          color: #475569 !important;
          font-weight: 600 !important;
          padding: 12px 16px !important;
          text-align: left !important;
          border-bottom: 1px solid #e2e8f0 !important;
          font-size: 13px !important;
        }
        td {
          padding: 12px 16px !important;
          border-bottom: 1px solid #e2e8f0 !important;
          font-size: 13px !important;
          color: #475569 !important;
        }
        tr:last-child td {
          border-bottom: none !important;
        }
        /* Estilizado refinado para los resultados */
        .passed {
          color: #16a34a !important;
          font-weight: 600 !important;
          background-color: #f0fdf4 !important;
        }
        .failed {
          color: #dc2626 !important;
          font-weight: 600 !important;
          background-color: #fef2f2 !important;
        }
        /* Hacer la tabla de entorno más compacta y sutil */
        #environment td:first-child {
          background-color: #f8fafc !important;
          font-weight: 500 !important;
          color: #64748b !important;
          width: 25% !important;
        }
        /* Ocultar textos repetitivos o innecesarios */
        .links { display: none !important; }
        EOF

        # 2. Ejecutamos pytest pasándole nuestro CSS personalizado
        pytest --html=reporte_tests.html --self-contained-html --css=estilo_minimalista.css --cov=. --cov-report=html

    - name: 📁 Adjuntar Reportes Interactivos como Artefactos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Reportes-Interactivos-Calidad
        path: |
          reporte_tests.html
          htmlcov/