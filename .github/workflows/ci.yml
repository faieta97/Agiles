name: Pipeline de Integración Continua (CI)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    name: 🐍 Ejecutar Pruebas y Cobertura
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Descargar código del repositorio
      uses: actions/checkout@v4

    - name: ⚙️ Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Instalar dependencias del sistema
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html pytest-cov

    - name: 🚀 Ejecutar pruebas y generar reportes HTML interactivos
      run: |
        # --html genera un reporte interactivo autodesplegable de los tests
        # --cov-report=html genera una carpeta web completa con la cobertura línea por línea
        pytest --html=reporte_tests.html --self-contained-html --cov=. --cov-report=html

    - name: 📁 Adjuntar Reportes Interactivos como Artefactos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Reportes-Interactivos-Calidad
        path: |
          reporte_tests.html
          htmlcov/