name: Pipeline de Integración Continua (CI)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    name: 🐍 Ejecutar Pruebas y Cobertura
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Descargar código del repositorio
      uses: actions/checkout@v4

    - name: ⚙️ Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Instalar dependencias del sistema
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-md-report pytest-cov

    - name: 🚀 Ejecutar pruebas unitarias y generar reporte Markdown
      run: |
        pytest --md-report --md-report-verbose 1 --md-report-color never --cov=. --cov-report=term-missing > pytest_results.txt

    - name: 📊 Publicar Reporte Visual en GitHub
      if: always()
      run: |
        echo "### 🚀 Resumen del Pipeline de Pruebas" >> $GITHUB_STEP_SUMMARY
        echo "El proceso de integración continua ha finalizado. A continuación se presentan los detalles métricos de los Unit Tests y la cobertura de código analizada automáticamente:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        cat pytest_results.txt >> $GITHUB_STEP_SUMMARY